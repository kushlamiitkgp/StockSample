
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


# Gateway Routing
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://authmgmt
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://usermgmt
spring.cloud.gateway.routes[1].predicates[0]=Path=/user/**

spring.cloud.gateway.routes[2].id=stock-service
spring.cloud.gateway.routes[2].uri=lb://stockmgmt
spring.cloud.gateway.routes[2].predicates[0]=Path=/stock/**